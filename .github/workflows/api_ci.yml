name: API CI

on:
  push:
    branches: "**"
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v3

      - name: Restore dependencies
        run: nix develop .# --command bash -c "cd backend && dotnet restore"

      - name: Build
        run: nix develop .# --command bash -c "cd backend && dotnet build --no-restore"

      - name: Check Code Quality
        run: |
          nix develop .# --command bash -c "
            cd backend && dotnet build --no-restore \
              /p:EnforceCodeStyleInBuild=true \
              /p:AnalysisLevel=latest \
              /p:TreatWarningsAsErrors=false \
              /warnaserror
          "

      - name: Run tests
        run: nix develop .# --command bash -c "cd backend && dotnet test --no-build --verbosity normal"

  all-checks-passed:
    needs: [test-backend]
    runs-on: [self-hosted, linux]  # ← fix this to match test-backend
    steps:
      - name: All checks passed
        run: echo "✅ All checks passed for API successfully!"
