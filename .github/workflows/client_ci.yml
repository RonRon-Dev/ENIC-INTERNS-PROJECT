name: Client CI

on:
  push:
    branches: "**"
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: nix develop .# --command bash -c "cd frontend && npm install"

      - name: Check code quality (lint)
        run: nix develop .# --command bash -c "cd frontend && npm run lint"

      - name: Check formatting (prettier)
        run: nix develop .# --command bash -c "cd frontend && npm run format:check"

      - name: Type check
        run: nix develop .# --command bash -c "cd frontend && npm run type-check"

      - name: Verify build
        run: nix develop .# --command bash -c "cd frontend && npm run build"

  all-checks-passed:
    needs: [test-frontend]
    runs-on: [self-hosted, linux]  # ← fix nixos to linux to match test-frontend
    steps:
      - name: All checks passed
        run: echo "✅ All checks passed for frontend successfully!"
