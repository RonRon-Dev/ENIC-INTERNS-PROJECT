name: CD - Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.nix'
      - '.env.production'
      - 'README.md'
      - '.github/**'

jobs:
  version-bump:
    runs-on: [self-hosted, windows]
    environment: production
    outputs:
      version: ${{ steps.version.outputs.version }}
      skip: ${{ steps.bump.outputs.skip }}
      docs_only: ${{ steps.bump.outputs.docs_only }}
      bump: ${{ steps.bump.outputs.bump }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Determine version bump
        id: bump
        shell: powershell
        run: |
          $lastVersionCommit = git log --pretty="%H %s" | Where-Object { 
            $_ -match "chore: bump version" -or $_ -match "docs: snapshot" 
          } | Select-Object -First 1

          if ($lastVersionCommit) {
            $lastHash = ($lastVersionCommit -split " ")[0]
            Write-Host "Last version commit: $lastHash"
            $COMMITS = git log "$lastHash..HEAD" --pretty=%B
          } else {
            $COMMITS = git log -10 --pretty=%B
          }

          Write-Host "Commits to analyze: $COMMITS"

          $filteredCommits = $COMMITS | Where-Object {
            $_ -notmatch "^chore: bump version" -and
            $_ -notmatch "^docs: snapshot" -and
            $_ -notmatch "^chore: auto migration" -and
            $_ -notmatch "^$"
          }

          if (-not $filteredCommits) {
            "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Only automated commits found, skipping"
            exit 0
          }

          $commitText = $filteredCommits -join "`n"
          Write-Host "Filtered commits: $commitText"

          if ($commitText -match 'BREAKING CHANGE') {
            "bump=major" >> $env:GITHUB_OUTPUT
            Write-Host "Major bump detected"
          } elseif ($commitText -match '(?m)^feat') {
            "bump=minor" >> $env:GITHUB_OUTPUT
            Write-Host "Minor bump detected"
          } elseif ($commitText -match '(?m)^(fix|refactor|perf)') {
            "bump=patch" >> $env:GITHUB_OUTPUT
            Write-Host "Patch bump detected"
          } elseif ($commitText -match '(?m)^docs') {
            "docs_only=true" >> $env:GITHUB_OUTPUT
            Write-Host "Docs only change detected"
          } elseif ($commitText -match '(?m)^(chore|style|test|misc)') {
            "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Skipping deployment"
          } else {
            "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "No deployment needed"
          }

      - name: Bump version in package.json
        if: steps.bump.outputs.skip != 'true' && steps.bump.outputs.docs_only != 'true'
        id: version-new
        shell: powershell
        run: |
          cd frontend
          npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version
          $VERSION = node -p "require('./package.json').version"
          "version=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Bumped to: beta-v$VERSION"

      - name: Get current version for docs only
        if: steps.bump.outputs.docs_only == 'true'
        id: version-docs
        shell: powershell
        run: |
          cd frontend
          $VERSION = node -p "require('./package.json').version"
          "version=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Docs only, keeping version: beta-v$VERSION"

      - name: Set version output
        if: steps.bump.outputs.skip != 'true'
        id: version
        shell: powershell
        run: |
          if ("${{ steps.bump.outputs.docs_only }}" -eq "true") {
            $VERSION = node -p "require('./frontend/package.json').version"
          } else {
            $VERSION = "${{ steps.version-new.outputs.version }}"
          }
          "version=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Final version: beta-v$VERSION"

      - name: Commit version bump
        if: steps.bump.outputs.skip != 'true' && steps.bump.outputs.docs_only != 'true'
        shell: powershell
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add frontend/package.json
          git commit -m "chore: bump version to beta-v${{ steps.version.outputs.version }}"
          git push origin main

  docs:
    needs: version-bump
    if: >
      needs.version-bump.outputs.skip != 'true' &&
      (needs.version-bump.outputs.docs_only == 'true' ||
       needs.version-bump.outputs.bump == 'minor' ||
       needs.version-bump.outputs.bump == 'major')
    runs-on: [self-hosted, windows]
    environment: production
    outputs:
      result: ${{ job.status }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Check if docs folder exists
        id: docs-check
        shell: powershell
        run: |
          if (Test-Path "frontend\docs") {
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "Docs folder found"
          } else {
            "exists=false" >> $env:GITHUB_OUTPUT
            Write-Host "No docs folder found, skipping"
          }

      - name: Install dependencies
        if: steps.docs-check.outputs.exists == 'true'
        shell: powershell
        run: |
          cd frontend
          npm install

      - name: Snapshot docs for minor and major bumps
        if: >
          steps.docs-check.outputs.exists == 'true' &&
          needs.version-bump.outputs.docs_only != 'true' &&
          (needs.version-bump.outputs.bump == 'minor' ||
           needs.version-bump.outputs.bump == 'major')
        shell: powershell
        run: |
          $prevVersion = "v${{ needs.version-bump.outputs.prev_version }}"
          $srcDocs     = "frontend\docs"
          $destSnapshot = "frontend\docs-versions\$prevVersion"

          if (!(Test-Path $destSnapshot)) {
            Copy-Item -Recurse -Force $srcDocs $destSnapshot
            Write-Host "Snapshot created: $destSnapshot"
          } else {
            Write-Host "Snapshot already exists: $destSnapshot - skipping"
          }

      - name: Update snapshot config
        if: >
          steps.docs-check.outputs.exists == 'true' &&
          needs.version-bump.outputs.docs_only != 'true' &&
          (needs.version-bump.outputs.bump == 'minor' ||
           needs.version-bump.outputs.bump == 'major')
        shell: powershell
        run: |
          $prevVersion = "v${{ needs.version-bump.outputs.prev_version }}"
          $configPath  = "frontend\docs-versions\$prevVersion\.vitepress\config.ts"

          if (Test-Path $configPath) {
            $content = Get-Content $configPath -Raw
            $content = $content -replace "base:.*,", "base: '/docs/$prevVersion/',"
            $content = $content -replace "text: 'v[\d.]+'", "text: '$prevVersion'"
            Set-Content $configPath $content
            Write-Host "Snapshot config updated for $prevVersion"
          }

      - name: Update version dropdown in latest docs
        if: >
          steps.docs-check.outputs.exists == 'true' &&
          needs.version-bump.outputs.docs_only != 'true' &&
          (needs.version-bump.outputs.bump == 'minor' ||
           needs.version-bump.outputs.bump == 'major')
        shell: powershell
        run: |
          $prevVersion = "v${{ needs.version-bump.outputs.prev_version }}"
          $newVersion  = "v${{ needs.version-bump.outputs.version }}"
          $configPath  = "frontend\docs\.vitepress\config.ts"
          $content     = Get-Content $configPath -Raw

          $content = $content -replace "text: 'v[\d.]+'", "text: '$newVersion'"
          $newEntry = "          { text: '$prevVersion', link: '/docs/$prevVersion/' },"
          $content  = $content -replace "(items: \[)", "`$1`n$newEntry"

          Set-Content $configPath $content
          Write-Host "Latest config updated: added $prevVersion to dropdown"

      - name: Commit docs changes
        if: steps.docs-check.outputs.exists == 'true'
        shell: powershell
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git pull origin main
          git add frontend/docs-versions/ frontend/docs/.vitepress/config.ts
          git commit -m "docs: snapshot v${{ needs.version-bump.outputs.prev_version }} to v${{ needs.version-bump.outputs.version }}"
          git push origin main
          Write-Host "Docs changes committed"

  prepare:
    needs: [version-bump, docs]
    if: >
      always() &&
      needs.version-bump.outputs.skip != 'true' &&
      (needs.docs.result == 'success' || needs.docs.result == 'skipped')
    runs-on: [self-hosted, windows]
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Restore appsettings.json
        shell: powershell
        run: |
          Copy-Item -Path "C:\Users\Ron\Desktop\secrets\appsettings.json" `
                    -Destination "${{ github.workspace }}\backend\appsettings.json" `
                    -Force
          Write-Host "appsettings.json restored"

      - name: Generate .env.prod
        shell: powershell
        run: |
          "APP_VERSION=beta-v${{ needs.version-bump.outputs.version }}" | Out-File .env.prod -Encoding utf8
          Write-Host ".env.prod generated"

  deploy:
    needs: [version-bump, docs, prepare]
    if: >
      always() &&
      needs.version-bump.outputs.skip != 'true' &&
      needs.prepare.result == 'success' &&
      (needs.docs.result == 'success' || needs.docs.result == 'skipped')
    runs-on: [self-hosted, windows]
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Restore appsettings.json
        shell: powershell
        run: |
          Copy-Item -Path "C:\Users\Ron\Desktop\secrets\appsettings.json" `
                    -Destination "${{ github.workspace }}\backend\appsettings.json" `
                    -Force

      - name: Generate .env.prod
        shell: powershell
        run: |
          "APP_VERSION=beta-v${{ needs.version-bump.outputs.version }}" | Out-File .env.prod -Encoding utf8

      - name: Build images
        shell: powershell
        run: |
          Write-Host "Building new images..."
          docker compose --env-file .env.prod --profile prod build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Switch containers
        shell: powershell
        run: |
          Write-Host "Switching to new containers..."
          docker compose --env-file .env.prod --profile prod up -d
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Cleanup
        shell: powershell
        run: |
          Write-Host "Cleaning up old images..."
          docker image prune -f

  notify:
    needs: [version-bump, deploy]
    if: always() && needs.version-bump.outputs.skip != 'true'
    runs-on: [self-hosted, windows]

    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        shell: powershell
        run: |
          if ("${{ needs.version-bump.outputs.docs_only }}" -eq "true") {
            Write-Host "Successfully deployed docs update"
          } else {
            Write-Host "Successfully deployed beta-v${{ needs.version-bump.outputs.version }}"
          }

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        shell: powershell
        run: Write-Host "Deployment failed for commit ${{ github.sha }}"
