name: CD - Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.nix'
      - '.env.production'
      - '**.md'
      - '.github/**'

jobs:
  deploy:
    runs-on: [self-hosted, windows]
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}


      - name: Restore appsettings.Production.json  # ← right after checkout
        shell: powershell
        run: |
          Copy-Item -Path "C:\Users\Ron\Desktop\secrets\appsettings.Production.json" `
                    -Destination "${{ github.workspace }}\backend\appsettings.Production.json" `
                    -Force
          Write-Host "appsettings.Production.json restored"

      - name: Determine version bump
        id: bump
        shell: powershell
        run: |
          $COMMIT_MSG = git log -1 --pretty=%B
          Write-Host "Commit message: $COMMIT_MSG"

          if ($COMMIT_MSG -match '^(chore|docs|style|test|misc)') {
            "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Skipping deployment for: $COMMIT_MSG"
            exit 0
          }

          if ($COMMIT_MSG -match 'BREAKING CHANGE') {
            "bump=major" >> $env:GITHUB_OUTPUT
          } elseif ($COMMIT_MSG -match '^feat') {
            "bump=minor" >> $env:GITHUB_OUTPUT
          } else {
            "bump=patch" >> $env:GITHUB_OUTPUT
          }

      - name: Bump version in package.json
        if: steps.bump.outputs.skip != 'true'
        id: version
        shell: powershell
        run: |
          cd frontend
          npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version
          $VERSION = node -p "require('./package.json').version"
          "version=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "Bumped to: beta-v$VERSION"

      - name: Commit version bump
        if: steps.bump.outputs.skip != 'true'
        shell: powershell
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add frontend/package.json
          git commit -m "chore: bump version to beta-v${{ steps.version.outputs.version }}"
          git push origin main

      - name: Generate .env.prod
        if: steps.bump.outputs.skip != 'true'
        shell: powershell
        run: |
          "APP_VERSION=beta-v${{ steps.version.outputs.version }}" | Out-File .env.prod -Encoding utf8

      - name: Deploy
        if: steps.bump.outputs.skip != 'true'
        shell: powershell
        run: |
          Write-Host "Starting deployment..."

          Write-Host "Building new images..."
          docker compose --env-file .env.prod --profile prod build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host "Switching to new containers..."
          docker compose --env-file .env.prod --profile prod up -d
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host "Cleaning up old images..."
          docker image prune -f

          Write-Host "Successfully deployed beta-v${{ steps.version.outputs.version }}"

      - name: Notify success
        if: success() && steps.bump.outputs.skip != 'true'
        shell: powershell
        run: Write-Host "Deployed beta-v${{ steps.version.outputs.version }}"

      - name: Notify failure
        if: failure()
        shell: powershell
        run: Write-Host "Deployment failed for commit ${{ github.sha }}"
